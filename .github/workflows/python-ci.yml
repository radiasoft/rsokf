name: python-ci
on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: curl -LsS https://radia.run | bash -s python-ci
